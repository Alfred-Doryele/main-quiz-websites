<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set a new password — Brainiac Quizzes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="auth-page">
  <a class="logo" href="index.html">
    <span class="logo-mark">B</span>
    <span class="logo-text">Brainiac<em>Quizzes</em></span>
  </a>
  <div class="auth-card">
    <p class="eyebrow">Password recovery</p>
    <h2>Set a new password</h2>

    <div id="authOfflineNotice" class="auth-offline-notice" hidden>
      No live backend is connected right now, so password recovery isn't available from this copy of the site.
    </div>

    <form id="authForm">
      <label for="authPassword">New password (6+ characters)</label>
      <input type="password" id="authPassword" autocomplete="new-password" required minlength="6">
      <button type="submit" class="btn btn-primary btn-block">Set new password</button>
      <p class="modal-note" id="authNote"></p>
    </form>

    <a class="auth-back" href="index.html">&larr; Back to Brainiac Quizzes</a>
  </div>
</div>
<script src="auth.js"></script>
<script>initResetPage();</script>
</body>
</html>
