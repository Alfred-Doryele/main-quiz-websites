<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset your password — Brainiac Quizzes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="auth-page">
  <a class="logo" href="index.html">
    <span class="logo-mark">B</span>
    <span class="logo-text">Brainiac<em>Quizzes</em></span>
  </a>
  <div class="auth-card">
    <p class="eyebrow">Password recovery</p>
    <h2>Reset your password</h2>
    <p class="modal-sub">Enter your account email and we'll send a reset link.</p>

    <div id="authOfflineNotice" class="auth-offline-notice" hidden>
      No live backend is connected right now, so password recovery isn't available from this copy of the site.
    </div>

    <form id="authForm">
      <label for="authEmail">Email</label>
      <input type="email" id="authEmail" autocomplete="email" required>
      <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
      <p class="modal-note" id="authNote"></p>
      <p class="modal-links"><a href="login.html">Back to log in</a></p>
    </form>

    <a class="auth-back" href="index.html">&larr; Back to Brainiac Quizzes</a>
  </div>
</div>
<script src="auth.js"></script>
<script>initForgotPage();</script>
</body>
</html>
