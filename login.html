<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Brainiac Quizzes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="auth-page">
  <a class="logo" href="index.html">
    <span class="logo-mark">B</span>
    <span class="logo-text">Brainiac<em>Quizzes</em></span>
  </a>
  <div class="auth-card">
    <p class="eyebrow">Player account</p>
    <h2>Log in</h2>
    <p class="modal-sub">Good to see you again.</p>

    <div id="authOfflineNotice" class="auth-offline-notice" hidden>
      No live backend is connected right now, so real accounts can't log in from this copy of the site.
      <a href="index.html">Go back and play as a guest instead</a>.
    </div>

    <form id="authForm">
      <label for="authIdentifier">Username or email</label>
      <input type="text" id="authIdentifier" autocomplete="username" required>
      <label for="authPassword">Password</label>
      <input type="password" id="authPassword" autocomplete="current-password" required>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
      <p class="modal-note" id="authNote"></p>
      <p class="modal-links">
        <a href="register.html">Create an account</a> &middot;
        <a href="forgot-password.html">Forgot password?</a>
      </p>
    </form>

    <a class="auth-back" href="index.html">&larr; Back to Brainiac Quizzes</a>
  </div>
</div>
<script src="auth.js"></script>
<script>initLoginPage();</script>
</body>
</html>
